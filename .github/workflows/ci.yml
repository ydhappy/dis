name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,disasm]"

      - name: Ruff check
        run: |
          python -m ruff check src tests

      - name: Pytest
        run: |
          python -m pytest -q

      - name: CLI smoke test
        run: |
          aia-reverse-lab --version
          python - <<'PY'
          import json
          from pathlib import Path
          Path('rules.json').write_text(json.dumps({'rules':[{'name':'admin','pattern':'admin','flags':['ignorecase']}]}), encoding='utf-8')
          PY
          aia-reverse-lab --transform base64-decode --transform-input SGVsbG8=
          aia-reverse-lab --bypass-sample "admin token" --bypass-rules rules.json --tool-json bypass.json
          test -f bypass.json

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
